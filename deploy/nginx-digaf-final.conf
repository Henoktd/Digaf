server {
    listen 80;
    server_name equity.digaf.et www.equity.digaf.et;
    return 301 https://equity.digaf.et$request_uri;
}

# Bare IP stays on plain HTTP as a break-glass fallback (no TLS cert is
# possible for an IP address) — not advertised or linked anywhere.
server {
    listen 80;
    server_name 196.190.220.15;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;
    server_name equity.digaf.et www.equity.digaf.et;

    ssl_certificate /etc/letsencrypt/live/equity.digaf.et/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/equity.digaf.et/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
